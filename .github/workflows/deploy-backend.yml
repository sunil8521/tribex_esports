name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    name: 🚀 Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: backend
        run: pnpm run build

      - name: Package artifact
        run: |
          mkdir -p deploy/backend
          cp -r backend/dist deploy/backend/
          cp backend/package.json backend/pnpm-lock.yaml deploy/backend/
          tar -czf backend.tar.gz -C deploy/backend .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: backend.tar.gz
          target: /tmp

      - name: Install & Restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            APP_DIR=${{ secrets.BACKEND_DIR || '~/apps/tribex-backend' }}

            mkdir -p $APP_DIR
            cd $APP_DIR

            tar -xzf /tmp/backend.tar.gz -C .
            rm -f /tmp/backend.tar.gz

            pnpm install --frozen-lockfile --prod

            if pm2 describe tribex-api > /dev/null 2>&1; then
              pm2 restart tribex-api
            else
              pm2 start dist/server.js --name tribex-api --node-args="--env-file=.env"
            fi

            pm2 save
