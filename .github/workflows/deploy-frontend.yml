name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'website/**'

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: 🌐 Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: website
        env:
          # Public vars (baked into the client bundle at build time)
          NEXT_PUBLIC_API_BASE_URL: https://api.tribexesports.com
          NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          # Server-only var (used by proxy.ts at runtime)
          JWT_ACCESS_SECRET: ${{ secrets.JWT_ACCESS_SECRET }}
        run: pnpm run build

      - name: Package standalone artifact
        run: |
          mkdir -p deploy/website
          cp -r website/.next/standalone/. deploy/website/
          cp -r website/.next/static deploy/website/.next/static
          cp -r website/public deploy/website/public

          # Write runtime env for server-only vars
          echo "JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}" > deploy/website/.env
          
          tar -czf website.tar.gz -C deploy/website .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: website.tar.gz
          target: /tmp

      - name: Install & Restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e

            APP_DIR=${{ secrets.FRONTEND_DIR || '~/apps/tribex-website' }}

            mkdir -p $APP_DIR
            cd $APP_DIR

            tar -xzf /tmp/website.tar.gz -C .
            rm -f /tmp/website.tar.gz

            if pm2 delete tribex-web > /dev/null 2>&1; then
              pm2 restart tribex-web
            else
              pm2 start server.js --name tribex-web --env PORT=3000
            fi

            pm2 save
